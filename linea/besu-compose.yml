services:
  # Besu node (Execution Layer for Maru)
  besu-node:
    hostname: el-client
    container_name: linea-besu
    image: ${BESU_IMAGE}
    platform: linux/amd64
    restart: unless-stopped
    network_mode: host
    # ports:
    #   - 127.0.0.1:${HTTP_PORT}:8545 #http
    #   - 127.0.0.1:${WS_PORT}:8546 #ws
    #   - 127.0.0.1:8550:8550 # Engine API (for Maru)
    #   - ${P2P_PORT}:${P2P_PORT} # P2P TCP
    #   - ${P2P_PORT}:${P2P_PORT}/udp # P2P UDP
    environment:
      - JAVA_OPTS=-Xmx2g
      - LOG4J_CONFIGURATION_FILE=/var/lib/besu/log4j.xml
    command:
      - --config-file=/var/lib/besu/linea-besu.config.toml
      - --Xdns-enabled=true
      - --Xdns-update-enabled=true
      - --Xrpc-ipc-enabled=true
      - --static-nodes-file=/var/lib/besu/static-nodes.json
      - --bonsai-trie-logs-pruning-window-size=${BONSAI_TRIE_LOGS_PRUNING_WINDOW_SIZE}
      - --bonsai-historical-block-limit=${BONSAI_HISTORICAL_BLOCK_LIMIT}
      - --auto-log-bloom-caching-enabled=true
      - --cache-last-blocks=2048
      - --cache-last-block-headers=50000
      - --bonsai-parallel-tx-processing-enabled=true
      - --p2p-enabled=true
      - --p2p-host=${EXT_IP}
      - --p2p-interface=0.0.0.0
      - --p2p-port=${P2P_PORT}
      - --bootnodes=${BOOTNODES}
    volumes:
      - ./besu/linea-besu.config.toml:/var/lib/besu/linea-besu.config.toml:ro
      - ./besu/log4j.xml:/var/lib/besu/log4j.xml
      - ./execution-layer-static-nodes.json:/var/lib/besu/static-nodes.json:ro
      - ./engine-jwt:/var/lib/besu/jwt:ro
      - $HOME/besu-db:/data

  # Maru Consensus Layer
  maru:
    hostname: linea-maru
    container_name: linea-cl
    image: ${MARU_IMAGE}
    restart: unless-stopped
    network_mode: host
    # ports:
    #   - "127.0.0.1:8180:8080" # Beacon/REST API
    #   - "9000:9000/tcp" # P2P main port
    #   - "9000:9000/udp" # P2P discovery port (UDP only)
    #   - "127.0.0.1:9090:9090" # Metrics (optional)
    environment:
      - JAVA_OPTS=-Xmx2g
    volumes:
      - ./maru/maru-config.toml:/opt/consensys/maru/configs/maru-config.toml:ro
      - ./maru/log4j.xml:/opt/consensys/maru/configs/log4j.xml:ro
      - ./engine-jwt:/opt/consensys/maru/configs/jwt:ro
      - ${HOME}/linea-maru-db:/opt/maru
    command:
      - "java"
      - "-Dlog4j2.configurationFile=/opt/consensys/maru/configs/log4j.xml"
      - "-jar"
      - "/opt/consensys/maru/maru.jar"
      - "--network"
      - "linea-mainnet"
      - "--config"
      - "/opt/consensys/maru/configs/maru-config.toml"

