# Configuration file for the kend (Kaia Endpoint Node — mainnet)

NETWORK="mainnet"
NETWORK_ID=

PORT=32323

SERVER_TYPE="http"
SYNCMODE="full"
VERBOSITY=3
MAXCONNECTIONS=100

TXPOOL_EXEC_SLOTS_ALL=4096
TXPOOL_NONEXEC_SLOTS_ALL=4096
TXPOOL_EXEC_SLOTS_ACCOUNT=4096
TXPOOL_NONEXEC_SLOTS_ACCOUNT=4096
TXPOOL_LIFE_TIME="30m"

RPC_ENABLE=1
RPC_API="klay,eth,net,web3,debug,txpool"
RPC_PORT=8551
RPC_ADDR="0.0.0.0"
RPC_CORSDOMAIN="*"
RPC_VHOSTS="*"
RPC_CONCURRENCYLIMIT=3000
RPC_READ_TIMEOUT=30
RPC_WRITE_TIMEOUT=30
RPC_IDLE_TIMEOUT=120
RPC_EXECUTION_TIMEOUT=30

WS_ENABLE=1
WS_API="klay,eth,net,web3,debug,txpool"
WS_ADDR="0.0.0.0"
WS_PORT=8552
WS_ORIGINS="*"

SC_MAIN_BRIDGE=0
SC_MAIN_BRIDGE_PORT=50505
SC_MAIN_BRIDGE_INDEXING=0

AUTO_RESTART=0
METRICS=1
PROMETHEUS=1
DB_NO_PARALLEL_WRITE=0
MULTICHANNEL=1
SUBPORT=32324

NO_DISCOVER=0
BOOTNODES=""

LOG_ROTATE=0
LOG_MAXSIZE=100
LOG_MAXBACKUPS=10
LOG_MAXAGE=30
LOG_COMPRESS=1

# Set at runtime by entrypoint.sh from EXT_IP in .env
ADDITIONAL=""

AUTO_RESTART_NODE=0
AUTO_RESTART_INTERVAL=0.1

DATA_DIR=/var/kend/data
LOG_DIR=/var/kend/data/logs
