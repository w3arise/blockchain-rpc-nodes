services:
  optimism-op-reth:
    image: ${OP_RETH_IMAGE}
    container_name: optimism-op-reth
    ports:
      - ${RPC_BIND_ADDR}:${HTTP_PORT}:8545
      - ${RPC_BIND_ADDR}:${WS_PORT}:8546
      - ${P2P_PORT}:${P2P_PORT}
      - ${P2P_PORT}:${P2P_PORT}/udp
    volumes:
        - ${HOST_DATADIR:-$HOME/optimism-op-reth-data}:/data
        - ./config:/config
    entrypoint: ["op-reth"]
    command:
      - node
      - --chain=optimism
      - --storage.v2
      - --datadir=/data
      - --rollup.sequencer-http=https://mainnet-sequencer.optimism.io/
      - --rollup.historicalrpc=https://mainnet.optimism.io
      - --rollup.disable-tx-pool-gossip
      - --http
      - --http.addr=0.0.0.0
      - --http.port=8545
      - --http.api=web3,debug,eth,txpool,net,trace
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=8546
      - --ws.api=web3,debug,eth,txpool,net,trace
      - --authrpc.addr=0.0.0.0
      - --authrpc.port=9551
      - --authrpc.jwtsecret=/config/jwt.hex
      - --rpc.gascap=${GAS_CAP}
      - --nat=extip:${EXT_IP}
      - --port=${P2P_PORT}
      - --discovery.addr=0.0.0.0
      - --discovery.port=${P2P_PORT}
      - --discovery.v5.port=${P2P_PORT}
      - --metrics=127.0.0.1:9001
    restart: unless-stopped
    stop_grace_period: 120s
    networks:
      - optimism-network

  optimism-op-node:
    image: ${OP_NODE_IMAGE}
    container_name: optimism-op-node
    command:
      - op-node
    env_file: .env
    ports:
      - ${RPC_BIND_ADDR}:${OP_NODE_RPC_PORT}:${OP_NODE_RPC_PORT}
      - ${OP_NODE_P2P_PORT}:${OP_NODE_P2P_PORT}
      - ${OP_NODE_P2P_PORT}:${OP_NODE_P2P_PORT}/udp
    volumes:
      - ${HOST_OP_NODE_DATADIR:-$HOME/optimism-op-node-data}:/data
      - ./config:/config
    restart: unless-stopped
    depends_on:
      optimism-op-reth:
        condition: service_started
    networks:
      - optimism-network

networks:
  optimism-network:
    driver: bridge
