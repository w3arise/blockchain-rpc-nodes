services:
  bitlayer-node:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GETH_VERSION: ${GETH_VERSION}
    image: bitlayer-geth:${GETH_VERSION}
    container_name: bitlayer-node
    restart: unless-stopped
    stop_grace_period: 120s
    env_file:
      - .env
    entrypoint: [geth]
    command:
      - --mainnet
      - --config=/config/config.toml
      - --datadir=/data
      - --syncmode=${SYNC_MODE}
      - --gcmode=${GCMODE}
      - --history.transactions=${HISTORY_TRANSACTIONS}
      - --nat=extip:${EXT_IP}
      - --authrpc.port=${AUTHRPC_PORT}
      - --traceaction=${TRACEACTION}
      - --verbosity=${VERBOSITY}
      - --bootnodes=${BOOTNODES}
    volumes:
      - ${HOST_DATADIR:-$HOME/bitlayer-data}:/data
      - ./config/config.toml:/config/config.toml:ro
    ports:
      - "${P2P_PORT}:${P2P_PORT}/tcp"
      - "${P2P_PORT}:${P2P_PORT}/udp"
      - "127.0.0.1:${HTTP_PORT}:${HTTP_PORT}"
      - "127.0.0.1:${WS_PORT}:${WS_PORT}"
      - "127.0.0.1:${AUTHRPC_PORT}:${AUTHRPC_PORT}"
    logging:
      options:
        max-size: "10m"
        max-file: "3"
