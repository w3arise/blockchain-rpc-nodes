name: lens-mainnet-external-node

services:
  postgres:
    image: postgres:16
    container_name: lens-postgres
    command: >
      postgres
      -c max_connections=200
      -c log_error_verbosity=terse
      -c shared_buffers=2GB
      -c effective_cache_size=4GB
      -c maintenance_work_mem=1GB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c min_wal_size=4GB
      -c max_wal_size=16GB
      -c max_worker_processes=16
      -c checkpoint_timeout=1800
    expose:
      - 5430
    volumes:
      - $HOME/lens-postgres-data:/var/lib/postgresql/data
    healthcheck:
      interval: 1s
      timeout: 3s
      test:
        [
          "CMD-SHELL",
          'psql -U postgres -c "select exists (select * from pg_stat_activity where datname = ''lens_local_ext_node'' and application_name = ''pg_restore'')" | grep -e ".f$$"',
        ]
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-notsecurepassword}
      PGPORT: 5430
    restart: unless-stopped
    networks:
      - lens-network

  external-node:
    image: matterlabs/external-node:${EN_VERSION}
    container_name: lens-external-node
    entrypoint:
      - /usr/bin/entrypoint.sh
    command: ["--components=core,api,da_fetcher,tree_fetcher"]
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - 127.0.0.1:${EN_HTTP_PORT:-3060}:${EN_HTTP_PORT:-3060}
      - 127.0.0.1:${EN_WS_PORT:-3061}:${EN_WS_PORT:-3061}
      - 127.0.0.1:${EN_HEALTHCHECK_PORT:-3081}:${EN_HEALTHCHECK_PORT:-3081}
    volumes:
      - $HOME/lens-rocksdb-data:/db
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-notsecurepassword}@postgres:5430/lens_local_ext_node
      DATABASE_POOL_SIZE: 10

      EN_HTTP_PORT: ${EN_HTTP_PORT:-3060}
      EN_WS_PORT: ${EN_WS_PORT:-3061}
      EN_HEALTHCHECK_PORT: ${EN_HEALTHCHECK_PORT:-3081}
      EN_PROMETHEUS_PORT: 3322
      EN_ETH_CLIENT_URL: ${EN_ETH_CLIENT_URL}
      EN_MAIN_NODE_URL: ${EN_MAIN_NODE_URL}
      EN_L1_CHAIN_ID: ${EN_L1_CHAIN_ID}
      EN_L2_CHAIN_ID: ${EN_L2_CHAIN_ID}
      EN_L1_BATCH_COMMIT_DATA_GENERATOR_MODE: ${EN_L1_BATCH_COMMIT_DATA_GENERATOR_MODE}
      EN_PRUNING_ENABLED: ${EN_PRUNING_ENABLED:-true}

      EN_STATE_CACHE_PATH: ./db/ext-node/state_keeper
      EN_MERKLE_TREE_PATH: ./db/ext-node/lightweight
      EN_SNAPSHOTS_RECOVERY_ENABLED: ${EN_SNAPSHOTS_RECOVERY_ENABLED:-true}
      EN_SNAPSHOTS_OBJECT_STORE_BUCKET_BASE_URL: ${EN_SNAPSHOTS_OBJECT_STORE_BUCKET_BASE_URL}
      EN_SNAPSHOTS_OBJECT_STORE_MODE: GCSAnonymousReadOnly
      RUST_LOG: ${RUST_LOG:-warn,zksync=info,zksync_core::metadata_calculator=info,zksync_state=info,zksync_utils=info,zksync_web3_decl::client=error}

      EN_DA_CLIENT: Avail
      EN_DA_AVAIL_CLIENT_TYPE: FullClient
      EN_DA_BRIDGE_API_URL: https://bridge-api.avail.so
      EN_DA_TIMEOUT_MS: "20000"
      EN_DA_API_NODE_URL: wss://mainnet.avail-rpc.com
      EN_DA_APP_ID: "26"
      EN_DA_SECRETS_SEED_PHRASE: ${EN_DA_SECRETS_SEED_PHRASE}

networks:
  lens-network:
    driver: bridge
