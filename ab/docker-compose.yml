services:
  ab-node:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GETH_VERSION: ${GETH_VERSION}
    image: ab-geth:${GETH_VERSION}
    container_name: ab-node
    restart: unless-stopped
    env_file:
      - .env
    command:
      - --networkid=${NETWORK_ID}
      - --syncmode=${SYNC_MODE}
      - --gcmode=${GCMODE}
      - --datadir=/data
      - --port=${P2P_PORT}
      - --discovery.port=${P2P_PORT}
      - --nat=extip:${EXT_IP}
      - --maxpeers=${MAX_PEERS}
      - --bootnodes=${BOOTNODES}
      - --cache=${CACHE}
      - --cache.preimages
      - --history.state=${STATE_HISTORY}
      - --history.transactions=${HISTORY_TRANSACTIONS}
      - --http
      - --http.addr=0.0.0.0
      - --http.port=${HTTP_PORT}
      - --http.vhosts=*
      - --http.corsdomain=*
      - --http.api=${HTTP_API}
      - --ws
      - --ws.addr=0.0.0.0
      - --ws.port=${WS_PORT}
      - --ws.api=${WS_API}
      - --ws.origins=*
      - --rpc.gascap=${GAS_CAP}
      - --rpc.evmtimeout=${RPC_EVM_TIMEOUT}
      - --rpc.txfeecap=${RPC_TX_FEE_CAP}
      - --rpc.batch-request-limit=${RPC_BATCH_REQUEST_LIMIT}
      - --rpc.batch-response-max-size=${RPC_BATCH_MAX_SIZE}
      - --txpool.nolocals
      - --txpool.pricelimit=${TXPOOL_PRICE_LIMIT}
      - --metrics
      - --metrics.addr=127.0.0.1
      - --metrics.port=${METRICS_PORT}
      - --verbosity=${VERBOSITY}
    volumes:
      - ${HOST_DATADIR:-$HOME/ab-data}:/data
    ports:
      - "${P2P_PORT}:${P2P_PORT}/tcp"
      - "${P2P_PORT}:${P2P_PORT}/udp"
      - "127.0.0.1:${HTTP_PORT}:${HTTP_PORT}"
      - "127.0.0.1:${WS_PORT}:${WS_PORT}"
      - "127.0.0.1:${METRICS_PORT}:${METRICS_PORT}"
    logging:
      options:
        max-size: "10m"
        max-file: "3"
