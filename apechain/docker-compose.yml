services:
  apechain:
    image: ${NITRO_IMAGE}
    container_name: apechain
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT}:8545"
      - "127.0.0.1:${WS_PORT}:8546"
    volumes:
      - "${HOME}/apechain-data:/home/user/.arbitrum"
      - "./config/nodeConfig.json:/config/nodeConfig.json:ro"
    entrypoint:
      - /usr/local/bin/nitro
    command:
      - --conf.file=/config/nodeConfig.json
      - --parent-chain.connection.url=${PARENT_CHAIN_RPC}
      - --execution.forwarding-target=${FORWARDING_TARGET}
      - --node.feed.input.url=${FEED_URL}
      - --node.data-availability.rest-aggregator.urls=${REST_AGGREGATOR_URL}
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    init: true
    stop_grace_period: 120s
