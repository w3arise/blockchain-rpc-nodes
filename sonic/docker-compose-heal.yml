services:
  sonic-heal:
    build:
      context: .
      args:
        SONIC_VERSION: ${SONIC_VERSION}
    image: sonic-node:${SONIC_VERSION}
    container_name: sonic-heal
    mem_limit: ${MEM_LIMIT}
    env_file:
      - .env
    entrypoint: ["/app/sonictool"]
    command: ["--datadir=/data", "--cache=${CACHE_MB}", "heal"]
    environment:
      - GOMEMLIMIT=${GOMEMLIMIT}
    volumes:
      - ${HOST_DATADIR:-$HOME/sonic-data}:/data
    network_mode: host
