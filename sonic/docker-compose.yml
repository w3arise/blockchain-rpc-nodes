services:
  sonic:
    build:
      context: .
      args:
        SONIC_VERSION: ${SONIC_VERSION}
    image: sonic-node:${SONIC_VERSION}
    container_name: sonic
    restart: unless-stopped
    mem_limit: ${MEM_LIMIT}
    stop_grace_period: 120s
    env_file:
      - .env
    environment:
      - GOMEMLIMIT=${GOMEMLIMIT}
    command:
      - --datadir=/data
      - --http
      - --http.addr=${HTTP_ADDR}
      - --http.corsdomain=*
      - --http.vhosts=*
      - --http.api=${HTTP_API}
      - --http.port=${HTTP_PORT}
      - --ws
      - --ws.addr=${WS_ADDR}
      - --ws.origins=*
      - --ws.api=${WS_API}
      - --ws.port=${WS_PORT}
      - --cache=${CACHE_MB}
      - --nat=extip:${EXT_IP}
      - --maxpeers=${MAX_PEERS}
      - --rpc.gascap=${GAS_CAP}
      - --rpc.txfeecap=${TX_FEE_CAP}
    volumes:
      - ${HOST_DATADIR:-$HOME/sonic-data}:/data
    network_mode: host
    logging:
      options:
        max-size: "10m"
        max-file: "3"
